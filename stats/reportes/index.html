<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>CEPREUNA - Reportes por Sede</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary-orange": "#ff5e0f",
                        "primary-blue": "#0381d9",
                        "primary-green": "#0da954",
                        "background-light": "#f7f6f8",
                        "background-dark": "#191022",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                },
            },
        }
    </script>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
    <!-- Top Bar -->
    <header class="sticky top-0 z-50 flex items-center bg-white dark:bg-background-dark px-4 py-3 border-b border-primary-blue/10 shadow-sm">
        <div class="flex items-center gap-3">
            <div class="bg-primary-blue text-white p-2 rounded-lg flex items-center justify-center">
                <span class="material-symbols-outlined text-2xl">assessment</span>
            </div>
            <div>
                <h1 class="text-lg font-bold leading-none text-slate-900 dark:text-slate-100">CEPREUNA</h1>
                <p class="text-[10px] uppercase tracking-wider text-primary-blue font-semibold">Reportes Detallados</p>
            </div>
        </div>
        <div class="ml-auto">
            <button id="refreshBtn" class="text-slate-600 dark:text-slate-400 p-1 hover:text-primary-blue transition">
                <span class="material-symbols-outlined">refresh</span>
            </button>
        </div>
    </header>

    <main class="pb-24">
        <!-- Title Section -->
        <div class="p-4 pb-0">
            <h2 class="text-xl font-bold tracking-tight">Reportes por Sede</h2>
            <p class="text-sm text-slate-500 dark:text-slate-400">Ciclo marzo-julio 2026-I • <span id="lastUpdate">Cargando...</span></p>
        </div>

        <!-- Reportes Container -->
        <div class="p-4 space-y-4" id="reportesContainer">
            <div class="flex items-center justify-center py-8">
                <div class="text-center">
                    <span class="material-symbols-outlined text-primary-blue text-5xl mb-2">hourglass_empty</span>
                    <p class="text-slate-500">Cargando reportes...</p>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <footer class="p-8 text-center">
            <p class="text-[11px] text-slate-400 font-medium">© 2026 CEPREUNA</p>
            <p class="text-[10px] text-slate-400">Centro Pre Universitario UNA Puno</p>
        </footer>
    </main>

    <!-- Bottom Navigation Bar -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white dark:bg-background-dark border-t border-primary-blue/10 px-4 pb-6 pt-2 flex justify-between items-center z-50 shadow-lg">
        <a class="flex flex-col items-center gap-1 text-slate-400" href="/stats">
            <span class="material-symbols-outlined">dashboard</span>
            <span class="text-[10px] font-bold">Resumen</span>
        </a>
        <a class="flex flex-col items-center gap-1 text-primary-blue" href="#">
            <span class="material-symbols-outlined fill-1">bar_chart</span>
            <span class="text-[10px] font-bold">Reportes</span>
        </a>
        <a class="flex flex-col items-center gap-1 text-slate-400" href="#">
            <span class="material-symbols-outlined">group</span>
            <span class="text-[10px] font-bold">Alumnos</span>
        </a>
        <a class="flex flex-col items-center gap-1 text-slate-400" href="/">
            <span class="material-symbols-outlined">home</span>
            <span class="text-[10px] font-bold">Inicio</span>
        </a>
    </nav>

    <script>
        // Colores para áreas
        const areaColors = {
            'Área 1': '#ff5e0f',
            'Área 2': '#0381d9',
            'Área 3': '#0da954',
            'Área 4': '#f97316'
        };

        // Cargar reportes
        async function cargarReportes() {
            try {
                const response = await fetch('/api/stats-inscripciones/reporte-sedes');
                const data = await response.json();

                const reportes = data.reporte || [];

                if (reportes.length === 0) {
                    document.getElementById('reportesContainer').innerHTML = `
                        <div class="flex items-center justify-center py-8">
                            <div class="text-center">
                                <span class="material-symbols-outlined text-slate-400 text-5xl mb-2">info</span>
                                <p class="text-slate-500">No hay datos disponibles</p>
                            </div>
                        </div>
                    `;
                    return;
                }

                let reportesHTML = '';

                reportes.forEach(sede => {
                    reportesHTML += `
                        <div class="bg-white dark:bg-slate-800/50 rounded-xl shadow-sm border border-primary-blue/10 overflow-hidden">
                            <!-- Header de Sede -->
                            <div class="bg-gradient-to-r from-primary-blue to-primary-blue/80 px-4 py-3 flex items-center gap-2">
                                <span class="material-symbols-outlined text-white">location_city</span>
                                <h3 class="font-bold text-white">Sede: ${sede.sede}</h3>
                            </div>

                            <!-- Turnos y Áreas -->
                            <div class="p-4 space-y-4">
                    `;

                    sede.turnos.forEach(turno => {
                        reportesHTML += `
                            <div class="border-l-4 border-primary-orange pl-4">
                                <h4 class="text-sm font-bold text-primary-orange mb-3 flex items-center gap-2">
                                    <span class="material-symbols-outlined text-lg">schedule</span>
                                    ${turno.turno}
                                </h4>
                                <div class="space-y-2">
                        `;

                        turno.areas.forEach((area, index) => {
                            const color = Object.values(areaColors)[index % Object.values(areaColors).length];
                            reportesHTML += `
                                <div class="flex items-center justify-between bg-slate-50 dark:bg-slate-800 rounded-lg p-3">
                                    <div class="flex items-center gap-2">
                                        <div class="w-3 h-3 rounded-full" style="background-color: ${color}"></div>
                                        <span class="text-sm font-medium">${area.area}</span>
                                    </div>
                                    <div class="flex items-center gap-2">
                                        <span class="text-lg font-bold text-slate-900 dark:text-slate-100">${area.total_inscritos}</span>
                                        <span class="text-xs text-slate-400">estudiantes</span>
                                    </div>
                                </div>
                            `;
                        });

                        reportesHTML += `
                                </div>
                            </div>
                        `;
                    });

                    reportesHTML += `
                            </div>
                        </div>
                    `;
                });

                document.getElementById('reportesContainer').innerHTML = reportesHTML;

                // Actualizar hora
                const ahora = new Date();
                document.getElementById('lastUpdate').textContent = `Actualizado ${ahora.toLocaleTimeString('es-PE')}`;

            } catch (error) {
                console.error('Error al cargar reportes:', error);
                document.getElementById('reportesContainer').innerHTML = `
                    <div class="flex items-center justify-center py-8">
                        <div class="text-center">
                            <span class="material-symbols-outlined text-red-500 text-5xl mb-2">error</span>
                            <p class="text-slate-500">Error al cargar reportes</p>
                        </div>
                    </div>
                `;
            }
        }

        // Cargar al iniciar
        cargarReportes();

        // Botón de refresh
        document.getElementById('refreshBtn').addEventListener('click', () => {
            cargarReportes();
            const btn = document.getElementById('refreshBtn');
            btn.querySelector('span').style.transform = 'rotate(360deg)';
            btn.querySelector('span').style.transition = 'transform 0.5s';
            setTimeout(() => {
                btn.querySelector('span').style.transform = 'rotate(0deg)';
            }, 500);
        });

        // Auto-refresh cada 5 minutos
        setInterval(cargarReportes, 5 * 60 * 1000);
    </script>
</body>
</html>
