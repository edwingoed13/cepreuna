<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>CEPREUNA - Reportes por Sede</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary-orange": "#ff5e0f",
                        "primary-blue": "#0381d9",
                        "primary-green": "#0da954",
                        "background-light": "#f7f6f8",
                        "background-dark": "#191022",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                },
            },
        }
    </script>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
        .tab-button {
            transition: all 0.2s;
            border-bottom: 3px solid transparent;
        }
        .tab-button.active {
            background-color: #0381d9 !important;
            color: white !important;
            border-bottom-color: #ff5e0f;
        }
        .tab-button.active:hover {
            background-color: #0381d9 !important;
        }
        .tab-button.active * {
            color: white !important;
        }
        .tab-button.active .text-slate-400,
        .tab-button.active div,
        .tab-button.active span {
            color: rgba(255, 255, 255, 0.9) !important;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        /* Mejorar scroll horizontal en móviles */
        #tabsHeader {
            scrollbar-width: none; /* Firefox */
            -ms-overflow-style: none;  /* IE and Edge */
        }
        #tabsHeader::-webkit-scrollbar {
            display: none; /* Chrome, Safari, Opera */
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
    <!-- Top Bar -->
    <header class="sticky top-0 z-50 flex items-center bg-white dark:bg-background-dark px-4 py-3 border-b border-primary-blue/10 shadow-sm">
        <div class="flex items-center gap-3">
            <div class="bg-primary-blue text-white p-2 rounded-lg flex items-center justify-center">
                <span class="material-symbols-outlined text-2xl">assessment</span>
            </div>
            <div>
                <h1 class="text-lg font-bold leading-none text-slate-900 dark:text-slate-100">CEPREUNA</h1>
                <p class="text-[10px] uppercase tracking-wider text-primary-blue font-semibold">Reportes Detallados</p>
            </div>
        </div>
        <div class="ml-auto">
            <button id="refreshBtn" class="text-slate-600 dark:text-slate-400 p-1 hover:text-primary-blue transition">
                <span class="material-symbols-outlined">refresh</span>
            </button>
        </div>
    </header>

    <main class="pb-24">
        <!-- Title Section -->
        <div class="p-4 pb-0">
            <h2 class="text-xl font-bold tracking-tight">Reportes por Sede</h2>
            <p class="text-sm text-slate-500 dark:text-slate-400">Ciclo marzo-julio 2026-I • <span id="lastUpdate">Cargando...</span></p>
        </div>

        <!-- Tabs de Sedes -->
        <div class="p-4">
            <div class="bg-white dark:bg-slate-800/50 rounded-xl shadow-sm border border-primary-blue/10 overflow-hidden">
                <!-- Tabs Header -->
                <div class="flex overflow-x-auto border-b border-slate-200 dark:border-slate-700 snap-x snap-mandatory" id="tabsHeader">
                    <!-- Se llenará dinámicamente -->
                </div>

                <!-- Tabs Content -->
                <div id="tabsContent">
                    <!-- Se llenará dinámicamente -->
                </div>
            </div>
        </div>

        <!-- Footer -->
        <footer class="p-8 text-center">
            <p class="text-[11px] text-slate-400 font-medium">© 2026 CEPREUNA</p>
            <p class="text-[10px] text-slate-400">Centro Pre Universitario UNA Puno</p>
        </footer>
    </main>

    <!-- Bottom Navigation Bar -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white dark:bg-background-dark border-t border-primary-blue/10 px-4 pb-6 pt-2 flex justify-between items-center z-50 shadow-lg">
        <a class="flex flex-col items-center gap-1 text-slate-400" href="/stats">
            <span class="material-symbols-outlined">dashboard</span>
            <span class="text-[10px] font-bold">Resumen</span>
        </a>
        <a class="flex flex-col items-center gap-1 text-primary-blue" href="#">
            <span class="material-symbols-outlined fill-1">bar_chart</span>
            <span class="text-[10px] font-bold">Reportes</span>
        </a>
        <a class="flex flex-col items-center gap-1 text-slate-400" href="#">
            <span class="material-symbols-outlined">group</span>
            <span class="text-[10px] font-bold">Alumnos</span>
        </a>
        <a class="flex flex-col items-center gap-1 text-slate-400" href="/">
            <span class="material-symbols-outlined">home</span>
            <span class="text-[10px] font-bold">Inicio</span>
        </a>
    </nav>

    <script>
        // Colores para áreas
        const areaColors = {
            'Área 1': '#ff5e0f',
            'Área 2': '#0381d9',
            'Área 3': '#0da954',
            'Área 4': '#f97316'
        };

        let reportesData = [];

        // Función para cambiar de tab
        function cambiarTab(sedeIndex) {
            // Desactivar todos los tabs
            document.querySelectorAll('.tab-button').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));

            // Activar tab seleccionado
            const activeTab = document.querySelector(`[data-tab="${sedeIndex}"]`);
            activeTab.classList.add('active');
            document.getElementById(`content-${sedeIndex}`).classList.add('active');

            // Scroll al tab activo en móviles
            activeTab.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
        }

        // Cargar reportes
        async function cargarReportes() {
            try {
                const response = await fetch('/api/stats-inscripciones/reporte-sedes');
                const data = await response.json();

                reportesData = data.reporte || [];

                if (reportesData.length === 0) {
                    document.getElementById('tabsHeader').innerHTML = `
                        <div class="p-8 text-center w-full">
                            <span class="material-symbols-outlined text-slate-400 text-5xl mb-2">info</span>
                            <p class="text-slate-500">No hay datos disponibles</p>
                        </div>
                    `;
                    return;
                }

                // Generar tabs header
                let tabsHeaderHTML = '';
                reportesData.forEach((sede, index) => {
                    const totalInscritos = sede.turnos.reduce((sum, turno) =>
                        sum + turno.areas.reduce((areaSum, area) => areaSum + area.total_inscritos, 0), 0
                    );

                    tabsHeaderHTML += `
                        <button
                            class="tab-button flex-shrink-0 px-3 sm:px-4 py-3 text-sm font-medium text-slate-600 hover:bg-slate-50 dark:hover:bg-slate-700 snap-start min-w-[120px] sm:min-w-0 ${index === 0 ? 'active' : ''}"
                            data-tab="${index}"
                            onclick="cambiarTab(${index})"
                        >
                            <div class="text-left">
                                <div class="font-bold text-xs sm:text-sm truncate max-w-[100px] sm:max-w-none">${sede.sede}</div>
                                <div class="text-[10px] sm:text-xs text-slate-400">${totalInscritos} est.</div>
                            </div>
                        </button>
                    `;
                });
                document.getElementById('tabsHeader').innerHTML = tabsHeaderHTML;

                // Generar tabs content
                let tabsContentHTML = '';
                reportesData.forEach((sede, index) => {
                    tabsContentHTML += `
                        <div id="content-${index}" class="tab-content p-4 space-y-4 ${index === 0 ? 'active' : ''}">
                    `;

                    if (sede.turnos.length === 0) {
                        tabsContentHTML += `
                            <div class="text-center py-8">
                                <span class="material-symbols-outlined text-slate-300 text-4xl mb-2">inbox</span>
                                <p class="text-slate-400 text-sm">No hay inscritos en esta sede</p>
                            </div>
                        `;
                    } else {
                        sede.turnos.forEach(turno => {
                            tabsContentHTML += `
                                <div class="border-l-4 border-primary-orange pl-4">
                                    <h4 class="text-sm font-bold text-primary-orange mb-3 flex items-center gap-2">
                                        <span class="material-symbols-outlined text-lg">schedule</span>
                                        ${turno.turno}
                                    </h4>
                                    <div class="space-y-2">
                            `;

                            turno.areas.forEach((area, areaIndex) => {
                                const color = Object.values(areaColors)[areaIndex % Object.values(areaColors).length];
                                tabsContentHTML += `
                                    <div class="flex items-center justify-between bg-slate-50 dark:bg-slate-800 rounded-lg p-3">
                                        <div class="flex items-center gap-2">
                                            <div class="w-3 h-3 rounded-full" style="background-color: ${color}"></div>
                                            <span class="text-sm font-medium">${area.area}</span>
                                        </div>
                                        <div class="flex items-center gap-2">
                                            <span class="text-lg font-bold text-slate-900 dark:text-slate-100">${area.total_inscritos}</span>
                                            <span class="text-xs text-slate-400">estudiantes</span>
                                        </div>
                                    </div>
                                `;
                            });

                            tabsContentHTML += `
                                    </div>
                                </div>
                            `;
                        });
                    }

                    tabsContentHTML += `</div>`;
                });
                document.getElementById('tabsContent').innerHTML = tabsContentHTML;

                // Actualizar hora
                const ahora = new Date();
                document.getElementById('lastUpdate').textContent = `Actualizado ${ahora.toLocaleTimeString('es-PE')}`;

            } catch (error) {
                console.error('Error al cargar reportes:', error);
                document.getElementById('tabsHeader').innerHTML = `
                    <div class="p-8 text-center w-full">
                        <span class="material-symbols-outlined text-red-500 text-5xl mb-2">error</span>
                        <p class="text-slate-500">Error al cargar reportes</p>
                    </div>
                `;
            }
        }

        // Cargar al iniciar
        cargarReportes();

        // Botón de refresh
        document.getElementById('refreshBtn').addEventListener('click', () => {
            cargarReportes();
            const btn = document.getElementById('refreshBtn');
            btn.querySelector('span').style.transform = 'rotate(360deg)';
            btn.querySelector('span').style.transition = 'transform 0.5s';
            setTimeout(() => {
                btn.querySelector('span').style.transform = 'rotate(0deg)';
            }, 500);
        });

        // Auto-refresh cada 5 minutos
        setInterval(cargarReportes, 5 * 60 * 1000);
    </script>
</body>
</html>
